name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Suporta tanto repositórios novos quanto antigos

permissions:
  contents: write # Necessário para fazer push na branch gh-pages

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 📦
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build App 🚀
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # O diretório de saída gerado pelo Vite Build
          branch: gh-pages # A branch de destino para o GitHub Pages
          clean: true # Remove arquivos antigos que não estão mais no build atual
